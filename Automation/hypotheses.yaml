      reward.vol_penalty_scale: 0.15
      environment.max_single_asset_weight: 0.20
      training.best_model_benchmark: balanced_6040

  # Drawdown, Sortino, and trading-friction ablations.
  - id: v22_exp80_s42_vol300_dd_tighter
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.15
      reward.drawdown_increase_penalty: 1.25
      reward.drawdown_level_floor: 0.04
      environment.max_single_asset_weight: 0.20

  - id: v23_exp80_s42_vol300_dd_strong
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.15
      reward.drawdown_increase_penalty: 1.75
      reward.drawdown_level_penalty: 5.0
      reward.drawdown_level_floor: 0.04
      environment.max_single_asset_weight: 0.20

  - id: v24_exp80_s42_vol300_sortino126
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.15
      reward.risk_window: 126
      reward.risk_bonus_scale: 2.5
      environment.max_single_asset_weight: 0.20

  - id: v25_exp80_s42_vol300_friction_high
