      environment.max_single_asset_weight: 0.20

  - id: v08_exp120_s101_vol300_cap20
    seed: 101
    patch:
      reward.exposure_risk_penalty_scale: 120.0
      reward.vol_penalty_scale: 0.15
      environment.max_single_asset_weight: 0.20

  # Volatility penalty dose response on the promising exposure/seed families.
  - id: v09_exp80_s42_vol150_cap20
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.075
      environment.max_single_asset_weight: 0.20

  - id: v10_exp80_s42_vol450_cap20
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
