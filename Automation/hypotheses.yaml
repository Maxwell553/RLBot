campaign: auto3w
description: >
  Three-week training-only automation plan. Runs 25 hypothesis variants across
  canonical windows W1-W5 (125 total trainings). No backtests are launched.

base_config: config/config.yaml
windows: [1, 2, 3, 4, 5]

# Default CLI arguments passed to scripts/train.py for every job. Keep timesteps
# unset here so train.py uses config/config.yaml's 50M-step budget.
train_args:
  no_viz: false

variants:
  # Controls and direct comparators from known cohorts.
  - id: v01_exp80_s42_vol0_cap20
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.0
      environment.max_single_asset_weight: 0.20

  - id: v02_exp80_s42_vol300_cap20
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.15
      environment.max_single_asset_weight: 0.20

  - id: v03_exp60_s101_vol0_cap20
    seed: 101
    patch:
      reward.exposure_risk_penalty_scale: 60.0
      reward.vol_penalty_scale: 0.0
      environment.max_single_asset_weight: 0.20

  - id: v04_exp60_s101_vol300_cap20
    seed: 101
    patch:
      reward.exposure_risk_penalty_scale: 60.0
      reward.vol_penalty_scale: 0.15
      environment.max_single_asset_weight: 0.20

  - id: v05_exp100_s0_vol0_cap20
