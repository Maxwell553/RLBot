  - id: v11_exp100_s0_vol150_cap20
    seed: 0
    patch:
      reward.exposure_risk_penalty_scale: 100.0
      reward.vol_penalty_scale: 0.075
      environment.max_single_asset_weight: 0.20

  - id: v12_exp100_s0_vol450_cap20
    seed: 0
    patch:
      reward.exposure_risk_penalty_scale: 100.0
      reward.vol_penalty_scale: 0.225
      environment.max_single_asset_weight: 0.20

  - id: v13_exp120_s101_vol150_cap20
    seed: 101
    patch:
