  # Per-asset cap ablations. Tests whether the current 20% cap is constraining
  # return, diversification, or Sharpe in the corrected-vol regime.
  - id: v15_exp80_s42_vol300_cap15
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.15
      environment.max_single_asset_weight: 0.15

  - id: v16_exp80_s42_vol300_cap25
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.15
      environment.max_single_asset_weight: 0.25

  - id: v17_exp80_s42_vol300_cap30
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.15
      environment.max_single_asset_weight: 0.30

  - id: v18_exp60_s101_vol0_cap25
