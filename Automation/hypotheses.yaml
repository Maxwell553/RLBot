  # Checkpoint-selection benchmark ablations. Training reward stays equal-weight;
  # only best_model selection benchmark changes.
  - id: v20_exp80_s42_vol300_eval6040
    seed: 42
    patch:
      reward.exposure_risk_penalty_scale: 80.0
      reward.vol_penalty_scale: 0.15
      environment.max_single_asset_weight: 0.20
      training.best_model_benchmark: balanced_6040

  - id: v21_exp100_s0_vol300_eval6040
