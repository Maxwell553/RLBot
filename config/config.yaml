# RLBot centralized configuration — version control this file with training runs.
# CLI flags in train.py override run-specific dates/run-id; hyperparameters default here.

# Number of tradeable assets N = number of keys under ``assets`` (supported range: 5–55).
# Each list in reward.benchmark_cap_weights and transaction_costs.* must have exactly N floats
# in the same key order. After edits: ``python scripts/train.py --refresh-data`` then a new --run-id.
universe:
  benchmark: SP500
  assets:
    SP500: SPY
    GOLD: GLD
    OIL: USO
    EURUSD: EURUSD=X
    USDJPY: USDJPY=X
    NIKKEI: "^N225"
    FTSE: "^FTSE"
    BOND10Y: IEF
    COPPER: HG=F
    EM: EEM

environment:
  initial_cash: 100000.0
  max_episode_steps: 252
  lookback: 20
  obs_lag_default: 1
  min_obs_lag: 0
  max_obs_lag: 2
  max_single_asset_weight: 0.35
  fee_scale_default: 1.0
  stop_loss_fraction: 0.45
  domain_randomize_fee_dr_min: 0.75
  domain_randomize_fee_dr_max: 1.1
  action_smoothing_alpha: 0.15  # same train + backtest (EMA on raw policy logits)
  domain_randomize_fee_beta_a: 5.0
  domain_randomize_fee_beta_b: 5.0

reward:
  reward_scale: 2000.0
  max_step_log_return: 0.06
  max_step_log_return_downside: -0.12
  risk_window: 63
  sortino_min_steps: 20
  risk_bonus_scale: 25.0
  # Cap-weighted passive benchmark for Sortino differential (same order as universe.assets keys)
  benchmark_cap_weights: [0.55, 0.04, 0.03, 0.02, 0.02, 0.08, 0.06, 0.10, 0.02, 0.08]
  # tx_cost_frac * churn_penalty * reward_scale * VIX_scale * curriculum_churn_scale
  churn_penalty: 1.0  # multiplier on realized tx cost (slippage + fees) in reward units
  drawdown_downside_gamma: 5.0  # amplifies negative step returns when already in drawdown
  inactivity_penalty_over_50: 1.5  # linear: cash_frac * this (no 50% step cliff)
  inactivity_penalty_over_90: 1.0  # extra linear ramp from 90% → 100% cash
  eval_inactivity_penalty_scale: 1.0
  participation_bonus: 0.05
  participation_reward_scale: 20.0

# Per-asset costs (one entry per universe.assets key, same order)
transaction_costs:
  slippage: [0.0001, 0.0002, 0.0003, 0.0001, 0.0001, 0.0005, 0.0005, 0.0001, 0.0008, 0.0002]
  tx_fee: [0.0001, 0.0002, 0.0002, 0.00005, 0.00005, 0.0010, 0.0010, 0.0001, 0.0005, 0.0002]
  annual_holding_cost: [0.0009, 0.0040, 0.0083, 0.0, 0.0, 0.0010, 0.0010, 0.0015, 0.0060, 0.0067]
  trading_days_per_year: 252

hyperparameters:
  learning_rate: 3.0e-4
  learning_rate_floor: 1.0e-6
  batch_size: 16384  # <= n_steps * n_envs; 65536/16384 = 4 mini-batches/epoch × n_epochs 3 = 12 backprop loops/pause
  n_steps: 4096
  n_epochs: 3
  gamma: 0.975
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_finetune: 0.1
  ent_coef_initial: 0.045
  ent_coef_finetune: 0.001
  vf_coef: 0.5
  max_grad_norm: 0.5
  weight_decay: 1.0e-3

policy:
  lstm_hidden_size: 64
  n_lstm_layers: 2
  net_arch_pi: [128, 128]
  net_arch_vf: [128, 128]

training:
  timesteps: 65000000
  n_envs: 16
  obs_noise: 0.02
  seed: 0
  block_size: 126
  eval_stride: 4
  eval_n_episodes: 1  # fallback if segment list empty; train.py sets n_eval = #eval blocks
  holdout_days: 365
  viz_freq: 500000
  curriculum_update_freq: 50000
  checkpoint_save_freq_steps: 1000000
  reproducible: false        # true → deterministic per-env seed streams (bit-reproducible)
  early_stop_patience: 0     # >0 → stop after K evals with no new best (after curriculum)

vec_normalize:
  norm_obs: true
  norm_reward_train: true
  clip_obs: 10.0
  clip_reward: 10.0

entropy_schedule:
  explore_ent: 0.045
  final_ent: 0.001
  early_floor: 0.01
  early_floor_high: 0.02
  warmup_improvements: 5  # logged only (eval NAV); does not gate decay
  decay_start_fraction: 0.45  # cosine decay starts after fee_ramp_fraction (0.45)
  dr_lock_fraction: 0.10
  early_floor_fraction: 0.45  # exploration floors through fee ramp (same milestone as decay start)

# Smoothed curriculum track: spread fee / churn / DR shifts across the 65M run (avoids mid-run cliffs).
curriculum:
  budget_short: 65000000
  budget_long: 120000000
  # ≤ budget_short: fraction-of-run schedule
  fee_free_fraction: 0.10
  fee_ramp_fraction: 0.45
  churn_ramp_floor: 0.10  # churn scale at fee-ramp start; ramps to 1.0 by fee_ramp_end
  dr_widen_span_fraction: 0.65
  # Long-run anchors (≥ budget_long)
  fee_free_long: 13300000
  fee_ramp_end_long: 40000000
  dr_widen_span_long: 30000000

data:
  since: "2005-01-01"
  fracdiff_d: 0.4
  feature_purge_warmup: 25  # neutralize first N bars at each joined train/eval segment
  # "continuous" (default): features precomputed on the contiguous panel then sliced
  #   into train/eval blocks (matches continuous backtest memory; purge NOT applied).
  # "independent": recompute features per segment + apply feature_purge_warmup, so the
  #   eval-selection signal is not feature-state-contaminated by adjacent train blocks.
  feature_split_mode: continuous
