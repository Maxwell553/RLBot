# First registry experiment (review P0-A / Phase 3 cliff re-test):
# does per-segment "independent" feature computation + purge change the in-training
# eval-NAV trajectory (the "validation cliff") vs the default "continuous" slicing,
# without degrading OOS? Dev tier (no final OOS read).
id: feature_split_ab
hypothesis: >
  Independent per-segment features (with the warmup purge applied) de-contaminate the
  eval-selection signal and shift the validation-NAV cliff timing vs continuous slicing,
  without degrading in-training eval NAV.
parent: baseline
base_config: config/config.yaml
grid:
  data.feature_split_mode: [continuous, independent]
seeds: [42, 101, 777]
windows:
  - name: w1
    train_end: "2020-12-31"
    holdout_start: "2021-01-01"
    holdout_end: "2022-12-31"
timesteps: 3000000
checkpoint_rule: best
evaluation_tier: 3        # dev sweep: train + in-training eval only, no OOS read
success_gates:
  eval_nav_mean_min: 100000
budget:
  max_modal_hours: 6
