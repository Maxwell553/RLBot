# Reward-balance grid: tx-cost-linked churn multiplier and participation scale.
# Read rew_decomp/abs_share + eval NAV to find balance where shaping terms are visible.
# Dev tier (no OOS read).
id: reward_ablation
hypothesis: >
  Raising participation_reward_scale and churn_penalty (multiplier on realized tx cost)
  steers exposure/turnover without degrading eval NAV.
parent: baseline
base_config: config/config.yaml
grid:
  reward.participation_reward_scale: [20.0, 60.0, 120.0]
  reward.churn_penalty: [0.5, 1.0, 2.0]
seeds: [42, 101]
windows:
  - name: w1
    train_end: "2020-12-31"
    holdout_start: "2021-01-01"
    holdout_end: "2022-12-31"
timesteps: 3000000
checkpoint_rule: best
evaluation_tier: 3
success_gates:
  eval_nav_mean_min: 100000
budget:
  max_modal_hours: 12
