# Reward-balance grid (review P1-A / §3.3 asymmetry finding): the inactivity penalty
# (~ -25 at 100% cash) dwarfs participation (+1) and ordinary churn (-0.85). Sweep the
# shaping scales and read rew_decomp/abs_share + eval NAV to find a balance where the
# terms are visible at target behaviors. Dev tier (no OOS read).
id: reward_ablation
hypothesis: >
  Raising participation_reward_scale and churn_penalty so each shaping term reaches a
  meaningful share of absolute reward steers exposure/turnover without degrading eval NAV.
parent: baseline
base_config: config/config.yaml
grid:
  reward.participation_reward_scale: [20.0, 60.0, 120.0]
  reward.churn_penalty: [4.0, 8.5, 15.0]
seeds: [42, 101]
windows:
  - name: W4  # canonical: train through 2021-12-31, holdout 2022-01-01..2023-12-31
timesteps: 3000000
checkpoint_rule: best
evaluation_tier: 3
success_gates:
  eval_nav_mean_min: 100000
budget:
  max_modal_hours: 12
