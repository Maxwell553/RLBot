# Curriculum-phase ablation: churn_ramp_floor vs fee_ramp_fraction interaction.
# Dev tier (no OOS read).
id: curriculum_ablation
hypothesis: >
  A higher churn_ramp_floor at fee-ramp start reduces early hyper-turnover without
  hurting eval NAV.
parent: baseline
base_config: config/config.yaml
grid:
  curriculum.churn_ramp_floor: [0.0, 0.1, 0.25]
  curriculum.fee_ramp_fraction: [0.35, 0.45]
seeds: [42]
windows:
  - name: w1
    train_end: "2020-12-31"
    holdout_start: "2021-01-01"
    holdout_end: "2022-12-31"
timesteps: 3000000
checkpoint_rule: best
evaluation_tier: 3
budget:
  max_modal_hours: 10
