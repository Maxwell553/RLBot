# Curriculum-phase ablation: does turning the churn penalty on earlier/later, or
# reshaping the fee ramp, move the validation-NAV cliff or participation behavior?
# Dev tier (no OOS read).
id: curriculum_ablation
hypothesis: >
  Earlier churn onset and a shorter fee ramp change the cliff timing / turnover without
  hurting eval NAV.
parent: baseline
base_config: config/config.yaml
grid:
  curriculum.churn_start_fraction: [0.10, 0.20, 0.35]
  curriculum.fee_ramp_fraction: [0.35, 0.45]
seeds: [42]
windows:
  - name: w1
    train_end: "2020-12-31"
    holdout_start: "2021-01-01"
    holdout_end: "2022-12-31"
timesteps: 3000000
checkpoint_rule: best
evaluation_tier: 3
budget:
  max_modal_hours: 10
