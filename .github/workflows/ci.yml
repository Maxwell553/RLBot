name: ci

on:
  push:
  pull_request:
  workflow_dispatch:  # manual trigger for the torch job below

jobs:
  torch-free-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install light deps (no torch)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas gymnasium pyyaml pytest
      # Run the whole tests/ tree (torch-dependent tests skip themselves) so a new
      # test file can never be silently excluded from CI.
      - name: Run torch-free test suite
        run: pytest -q tests/

  # Manual/weekly heavy job: installs the full stack so the torch-gated tests
  # (vecnorm freeze, CLI imports) actually run instead of skipping.
  torch-tests:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install full deps (editable, pulls torch)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run full test suite (torch-gated tests included)
        run: pytest -q tests/
